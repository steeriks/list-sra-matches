name: Update SRA Matches

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Generate match list
        env:
          SSI_EMAIL:    ${{ secrets.SSI_EMAIL }}
          SSI_PASSWORD: ${{ secrets.SSI_PASSWORD }}
          SSI_KEY:      ${{ secrets.SSI_KEY }}
        run: python fetch_sra.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
